name: Database Migrations

on:
  push:
    branches:
      - main
      - production
    paths:
      - 'supabase/migrations/**'
      - '.github/workflows/database-migrations.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: db-migrations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-migrations:
    name: Deploy Supabase migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          set -euo pipefail
          test -n "${SUPABASE_ACCESS_TOKEN}" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "${SUPABASE_PROJECT_REF}" || { echo "Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "${SUPABASE_DB_PASSWORD}" || { echo "Missing SUPABASE_DB_PASSWORD"; exit 1; }

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Push migrations
        run: supabase db push --password "${SUPABASE_DB_PASSWORD}"
